# ============================================================
# Alembic — Configuration des migrations DocFlow AI
# ============================================================

[alembic]
# Chemin vers le répertoire de migrations (relatif à ce fichier)
script_location = alembic

# Template pour les noms de fichiers de migration
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Encodage des fichiers de migration
output_encoding = utf-8

# URL de connexion (surchargée par env.py depuis DATABASE_URL)
sqlalchemy.url = postgresql+asyncpg://docflow:changeme@localhost:5432/docflow

[post_write_hooks]
# Pas de hooks pour l'instant

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
