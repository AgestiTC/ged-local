name: Build & Push — Gitea Container Registry

# Déclenché sur push main (→ tag :latest) ou tag vX.Y.Z (→ tag :vX.Y.Z + :latest)
on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build-push:
    name: Build & Push images Docker
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Login registry Gitea ──────────────────────────────
      - name: Login — Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: git.agesti.fr
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      # ── 3. Calcul des tags ───────────────────────────────────
      # Sur main  : :latest
      # Sur tag   : :vX.Y.Z + :latest
      - name: Calcul des tags
        id: tags
        run: |
          BACKEND_BASE="git.agesti.fr/tclement/docflow-backend"
          FRONTEND_BASE="git.agesti.fr/tclement/docflow-frontend"
          REF="${{ github.ref }}"

          if [[ "$REF" == refs/tags/* ]]; then
            VERSION="${REF#refs/tags/}"
            echo "backend_tags=${BACKEND_BASE}:${VERSION}" >> $GITHUB_OUTPUT
            echo "frontend_tags=${FRONTEND_BASE}:${VERSION}" >> $GITHUB_OUTPUT
            echo "extra_tag_backend=${BACKEND_BASE}:latest" >> $GITHUB_OUTPUT
            echo "extra_tag_frontend=${FRONTEND_BASE}:latest" >> $GITHUB_OUTPUT
            echo "has_extra=true" >> $GITHUB_OUTPUT
          else
            echo "backend_tags=${BACKEND_BASE}:latest" >> $GITHUB_OUTPUT
            echo "frontend_tags=${FRONTEND_BASE}:latest" >> $GITHUB_OUTPUT
            echo "has_extra=false" >> $GITHUB_OUTPUT
          fi

      # ── 4. Build + Push backend ───────────────────────────────
      # Utilise docker build classique (sans buildx) pour compatibilité
      # avec le daemon Docker 24.0.2 du NAS Synology (API max 1.43)
      - name: Build & Push — backend
        env:
          DOCKER_BUILDKIT: "0"
        run: |
          docker build \
            --tag "${{ steps.tags.outputs.backend_tags }}" \
            ./backend
          docker push "${{ steps.tags.outputs.backend_tags }}"
          if [[ "${{ steps.tags.outputs.has_extra }}" == "true" ]]; then
            docker tag "${{ steps.tags.outputs.backend_tags }}" "${{ steps.tags.outputs.extra_tag_backend }}"
            docker push "${{ steps.tags.outputs.extra_tag_backend }}"
          fi

      # ── 5. Build + Push frontend ──────────────────────────────
      # VITE_API_URL="" → URLs relatives → nginx proxie /api/ vers backend
      - name: Build & Push — frontend
        env:
          DOCKER_BUILDKIT: "0"
        run: |
          docker build \
            --tag "${{ steps.tags.outputs.frontend_tags }}" \
            --build-arg VITE_API_URL= \
            ./frontend
          docker push "${{ steps.tags.outputs.frontend_tags }}"
          if [[ "${{ steps.tags.outputs.has_extra }}" == "true" ]]; then
            docker tag "${{ steps.tags.outputs.frontend_tags }}" "${{ steps.tags.outputs.extra_tag_frontend }}"
            docker push "${{ steps.tags.outputs.extra_tag_frontend }}"
          fi
