# ============================================================
# DocFlow AI — Override Dev (hot-reload)
# Usage : docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ============================================================
# En développement :
#   - Le code backend est monté en live (hot-reload avec uvicorn --reload)
#   - Le frontend tourne via Vite dev server (port 5173)
#   - LOG_FORMAT=console pour une lecture plus agréable
# ============================================================

services:

  backend:
    environment:
      DEBUG: "true"
      LOG_LEVEL: DEBUG
      LOG_FORMAT: console
    volumes:
      # Code source monté en live pour hot-reload
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app

  # En dev, le frontend tourne avec Vite (pas Nginx)
  # Lancer manuellement : cd frontend && npm run dev
  frontend:
    # Désactiver le conteneur frontend en dev
    profiles: ["prod"]
