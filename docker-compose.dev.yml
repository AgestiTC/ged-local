# ─────────────────────────────────────────────────────────────────────────────
# Stack de DÉVELOPPEMENT Matothèque — tout en conteneurs, code monté, hot-reload.
# (Pattern NetSight : compose dev autonome + Dockerfile.dev par composant.)
#
# Principe : on NE reconstruit JAMAIS d'image quand on change le CODE.
#   - Les images dev (Dockerfile.dev) ne contiennent QUE les dépendances.
#   - Le code (backend/ et frontend/) est monté en volume → reload à chaud
#     (uvicorn --reload côté API, HMR Vite côté UI).
#   - Aucun outil requis sur l'hôte (ni Python, ni Node).
#
# Démarrage :
#   docker compose -f docker-compose.dev.yml up
#     → UI  : http://localhost:5174     ·     API : http://localhost:8000/docs
#
# Reconstruire une image dev UNIQUEMENT si une dépendance change :
#   docker compose -f docker-compose.dev.yml build backend    # requirements.txt
#   docker compose -f docker-compose.dev.yml build frontend   # package.json
#
# Ports choisis pour COEXISTER avec NetSight (qui occupe 5173/5432) :
#   - postgres & tika : PAS de port hôte (accès interne au réseau Docker)
#   - backend  : 8000   ·   frontend (Vite) : 5174
# Ollama & n8n restent sur l'hôte (host.docker.internal).
# ─────────────────────────────────────────────────────────────────────────────
name: matotheque-dev

services:

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: docflow
      POSTGRES_USER: docflow
      POSTGRES_PASSWORD: dev
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docflow -d docflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  tika:
    image: apache/tika:latest
    restart: unless-stopped

  clamav:
    image: clamav/clamav:latest
    restart: unless-stopped
    # 1er démarrage : télécharge la base virale (~quelques minutes) avant d'être "healthy".
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    volumes:
      - ./data/clamav:/var/lib/clamav   # base virale persistée (évite re-download)

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    environment:
      DATABASE_URL: postgresql+asyncpg://docflow:dev@postgres:5432/docflow
      TIKA_URL: http://tika:9998
      CLAMAV_HOST: clamav
      CLAMAV_PORT: "3310"
      OLLAMA_URL: http://host.docker.internal:11434
      N8N_URL: http://host.docker.internal:5678
      OLLAMA_MODEL_DEFAULT: mixtral:latest
      OLLAMA_MODEL_FAST: mistral:latest
      OLLAMA_MODEL_EMBEDDING: qwen3-embedding:8b
      OLLAMA_MODEL_EMBEDDING_FALLBACK: nomic-embed-text:latest
      LOG_LEVEL: DEBUG
      LOG_FORMAT: console
      LOG_FILE: /app/logs/docflow-backend.log
      DEBUG: "true"
    volumes:
      - ./backend:/app                       # code → hot-reload
      - ./VERSION:/VERSION:ro                 # /api/version correct en dev
      - ./storage:/app/storage               # uploads / exports / templates
      - ./logs:/app/logs
      - ${DOCUMENTS_ROOT:-./storage/documents}:/app/documents:rw   # RW pour quarantaine doublons
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      tika:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      # Le proxy /api de Vite vise le service `backend` (pas localhost, qui serait
      # le conteneur UI lui-même). Lu par vite.config.ts.
      VITE_API_TARGET: http://backend:8000
      VITE_PORT: "5174"
    volumes:
      - ./frontend:/app          # source → HMR
      - /app/node_modules        # garde le node_modules installé dans l'image
    ports:
      - "5174:5174"
    depends_on:
      - backend

# Persistance : bind mounts sous ./data/ et ./storage/ (créés au `up`).
