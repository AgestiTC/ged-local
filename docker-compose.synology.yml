# ============================================================
# DocFlow AI — Override Synology NAS
# ============================================================
#
# Usage :
#   docker compose -f docker-compose.yml -f docker-compose.synology.yml up -d
#
# Ce fichier surcharge docker-compose.yml pour le déploiement
# sur un Synology NAS (DSM 7 / Container Manager).
#
# Points clés :
#   - Ollama tourne sur le PC Windows → OLLAMA_URL = IP du PC
#   - n8n tourne sur le PC Windows   → N8N_URL = IP du PC
#   - Tika tourne dans Docker sur le NAS (inclus dans compose)
#   - Le frontend utilise le proxy nginx → VITE_API_URL = ""
#   - Les volumes pointent vers /volume1/ du NAS
#
# Avant de démarrer :
#   1. Copier .env.synology.example en .env.synology
#   2. Remplir WINDOWS_PC_IP et les chemins /volume1/...
#   3. docker compose -f docker-compose.yml \
#        -f docker-compose.synology.yml \
#        --env-file .env.synology up -d
# ============================================================

services:

  # ----------------------------------------------------------
  # PostgreSQL — volumes sur /volume1/ du NAS
  # ----------------------------------------------------------
  postgres:
    volumes:
      - ${SYNOLOGY_DATA_PATH:-/volume1/docker/docflow/data/postgres}:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  # ----------------------------------------------------------
  # Backend — pointe vers le PC Windows pour Ollama/n8n
  # ----------------------------------------------------------
  backend:
    environment:
      # Ollama et n8n tournent sur le PC Windows, pas sur le NAS
      OLLAMA_URL: ${OLLAMA_URL}
      N8N_URL: ${N8N_URL}
      # Tika est dans Docker sur le NAS
      TIKA_URL: http://tika:9998
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: json
    volumes:
      - ${SYNOLOGY_UPLOADS_PATH:-/volume1/docker/docflow/storage/uploads}:/app/storage/uploads
      - ${SYNOLOGY_EXPORTS_PATH:-/volume1/docker/docflow/storage/exports}:/app/storage/exports
      - ${SYNOLOGY_TEMPLATES_PATH:-/volume1/docker/docflow/storage/templates}:/app/storage/templates
      - ${SYNOLOGY_LOGS_PATH:-/volume1/docker/docflow/logs}:/app/logs
      # Dossiers de documents surveillés (lecture seule)
      - ${DOCUMENTS_ROOT:-/volume1/documents}:/app/documents:ro
    # Sur Synology, host.docker.internal pointe sur le NAS lui-même (utile pour Tika si hors Docker)
    # Ici non nécessaire car Tika est dans le même réseau Docker
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ----------------------------------------------------------
  # Frontend — build avec VITE_API_URL vide → proxy nginx
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Vide = URLs relatives → proxy nginx → plus besoin d'IP baked
        VITE_API_URL: ""
    ports:
      - "${FRONTEND_PORT:-3001}:80"
