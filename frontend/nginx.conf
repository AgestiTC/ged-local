server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Health check backend ─────────────────────────────────────
    # /health est à la racine du backend (hors /api/)
    location = /health {
        proxy_pass         http://backend:8000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── Proxy API → backend ──────────────────────────────────────
    # Le frontend appelle /api/* en relatif.
    # Nginx redirige vers le service backend Docker.
    # Cela évite de bake l'IP du NAS dans le build frontend.
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE (Server-Sent Events) — génération de rapports en streaming
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 600s;   # 10 min pour Mixtral
        proxy_send_timeout 600s;

        # Upload de fichiers volumineux
        client_max_body_size 512m;
    }

    # ── SPA : toutes les routes → index.html ────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache des assets statiques ───────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Pas de cache pour index.html ─────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # ── Gzip ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/event-stream;
}
